name: Publish to npm

# Releases are tag-driven: push a tag like `v0.1.0` and this workflow publishes
# that version to npm. The tag MUST match the version in package.json.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # required for npm provenance (--provenance)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="v$(node -p "require('./package.json').version")"
          if [ "${GITHUB_REF_NAME}" != "${PKG_VERSION}" ]; then
            echo "::error::Tag '${GITHUB_REF_NAME}' does not match package.json version '${PKG_VERSION}'. Bump package.json (npm version ...) before tagging."
            exit 1
          fi
          echo "Tag and package.json agree on ${PKG_VERSION}."

      - name: Build & test
        run: npm test

      # dist/ is already built+tested above, so skip the prepublishOnly re-run.
      # Drop --provenance if your npm token/registry can't attest (private/legacy).
      - name: Publish to npm
        run: npm publish --provenance --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
